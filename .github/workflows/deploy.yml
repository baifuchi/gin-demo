name: 自动部署到阿里云

on:
  push:
    branches: [ master ]  # 只有master推送才触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: 编译 Linux 版本
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o gin-demo

            # 👇 这一步才是真正把文件传到服务器
      - name: 上传完整项目到阿里云（覆盖更新）
        uses: appleboy/scp-action@master
        with:
          host: 47.99.76.213
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 上传所有需要的文件/目录，用逗号分隔
          source: "gin-demo,configs,data,internal,go.mod,go.sum"
          target: "/root/gin-demo"
          # 覆盖模式：直接覆盖已存在的文件
          overwrite: true
          timeout: 300s

      - name: 重启服务
        uses: appleboy/ssh-action@master
        with:
          host: 47.99.76.213
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: "300s"
          command_timeout: "300s"
          script: |
            cd /root/gin-demo
            chmod +x gin-demo
            pkill -f gin-demo 2>/dev/null || true
            nohup ./gin-demo > app.log 2>&1 &
            echo "✅ 项目完整部署完成，配置文件已同步更新"
